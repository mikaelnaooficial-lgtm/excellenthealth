    <script data-cfasync="false">
    // Lógica de Delay e Scroll PRO
    document.addEventListener("DOMContentLoaded", function() {
        const SECONDS_TO_SHOW = 2960; // 49:20
        let isRevealed = false;
        let videoElement = null;

        const checkInterval = setInterval(function() {
            if (!videoElement) {
                const playerWrapper = document.querySelector('vturb-smartplayer');
                if (playerWrapper && playerWrapper.shadowRoot) {
                    videoElement = playerWrapper.shadowRoot.querySelector('video');
                } else {
                    videoElement = document.querySelector('video');
                }
            }

            if (videoElement && videoElement.currentTime >= SECONDS_TO_SHOW && !isRevealed) {
                isRevealed = true;
                clearInterval(checkInterval);

                // Desbloqueia a seção
                const delayDiv = document.querySelector('[data-delay]');
                if (delayDiv) {
                    delayDiv.style.setProperty('display', 'block', 'important');
                }

                // Inicia Cronômetro
                initCountdown();

                // Scroll Suave
                setTimeout(function() {
                    const target = document.querySelector('#kits');
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 400);
            }
        }, 1000);
    });

    function initCountdown() {
        let totalSeconds = 30 * 60;
        const display = document.querySelector("#contador");
        const timer = setInterval(() => {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            if (display) {
                display.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }
            if (totalSeconds <= 0) clearInterval(timer);
            totalSeconds--;
        }, 1000);
    }
